<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Referencia Completa — CRM Despachante Matilde</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fbf9f6; --bg-2: #f4f1ec; --surface: #fff;
  --border: #e8e3da; --border-strong: #d4ccbe;
  --text: #1b1a17; --text-2: #4a4640; --text-3: #7a7368; --text-muted: #a39b8e;
  --accent: #c26a12; --accent-soft: #fde9c9; --accent-softer: #fdf4e4; --accent-strong: #8a4606; --accent-ink: #3a1d03;
  --success: #2f7a3d; --warn: #a66a00; --danger: #b1361d; --info: #1f5a8a;
  --shadow-sm: 0 1px 2px rgba(40,30,14,.05);
  --shadow-md: 0 4px 16px rgba(40,30,14,.08);
  --shadow-lg: 0 24px 48px -16px rgba(40,30,14,.2);
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
.page { max-width: 1200px; margin: 0 auto; padding: 80px 48px 120px; }
.hero { padding-bottom: 56px; border-bottom: 1px solid var(--border); margin-bottom: 56px; }
.eyebrow { font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 18px; }
h1 { font-family: 'Fraunces', serif; font-size: 84px; font-weight: 500; letter-spacing: -0.03em; margin: 0 0 20px; line-height: 0.95; }
h1 em { font-style: italic; color: var(--accent); }
.lede { font-size: 18px; color: var(--text-2); max-width: 54ch; line-height: 1.5; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
.stat { padding-left: 20px; border-left: 2px solid var(--accent); }
.stat-val { font-family: 'Fraunces', serif; font-size: 44px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; }
.stat-lab { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
</style>
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="eyebrow">Referencia completa · abril 2026</div>
    <h1>O sistema,<br/>por <em>inteiro</em>.</h1>
    <p class="lede">Protótipo hi-fi, design system documentado, mapa visual de todas as telas e handoff técnico pros devs.</p>
  </header>
  <div class="stats">
    <div class="stat"><div class="stat-val">11</div><div class="stat-lab">Telas mapeadas</div></div>
    <div class="stat"><div class="stat-val">42</div><div class="stat-lab">Design tokens</div></div>
    <div class="stat"><div class="stat-val">18</div><div class="stat-lab">Componentes</div></div>
    <div class="stat"><div class="stat-val">5</div><div class="stat-lab">Tipos de OS</div></div>
  </div>
</div>
</body>
</html>
